version: '3.8'

services:
  app:
    build: .
    container_name: beanpon_messenger
    restart: always
    ports:
      - "10.10.0.5:5082:5082"
    environment:
      - ENV=production
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: beanpon_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "10.10.0.5:9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: beanpon_grafana
    restart: always
    ports:
      - "10.10.0.5:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: