services:
  app:
    build: .
    container_name: beanpon_messenger
    restart: always
    ports:
      - "10.10.0.5:5082:5082"
    environment:
      - ENV=production
    networks:
      - monitoring
      - beanpon_local-network

networks:
  monitoring:
    driver: bridge
  beanpon_local-network:
    external: true
