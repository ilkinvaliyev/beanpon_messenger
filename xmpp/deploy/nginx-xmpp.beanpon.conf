# xmpp.beanpon.com — host nginx site for XMPP-over-WebSocket.
#
# Mirrors msg.beanpon.conf but points at ejabberd's PLAIN WebSocket port (5280).
# Flow: client → Cloudflare (TLS) → host nginx :80 → ejabberd 10.10.0.5:5280.
# ejabberd does NOT do TLS on 5280 (Cloudflare already did), so no double-TLS.
#
# Install on the host:
#   sudo cp nginx-xmpp.beanpon.conf /etc/nginx/conf.d/xmpp.beanpon.conf
#   sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name xmpp.beanpon.com;

    # ejabberd serves both /ws (WebSocket) and /bosh under this host.
    location / {
        proxy_pass http://10.10.0.5:5280;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (critical for /ws).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # XMPP sessions are long-lived; don't cut idle WebSockets.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
