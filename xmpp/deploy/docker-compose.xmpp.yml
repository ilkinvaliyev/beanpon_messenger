# ============================================================================
# docker-compose.xmpp.yml — adds the ejabberd XMPP backbone next to the
# existing beanpon_messenger Go service.
#
# Usage — run from THIS directory (xmpp/deploy) so the relative ./ paths to
# ejabberd.yml and beanpon.pem resolve correctly:
#
#   cd xmpp/deploy
#   docker compose -f docker-compose.xmpp.yml up -d
#
# Do NOT merge it with the root docker-compose.yml via -f; merging makes the
# relative volume paths resolve against the repo root and breaks the mount.
# ejabberd is a standalone backbone — it does not need the app compose file.
#
# The Go service stays exactly as it is; it simply gains a few env vars
# (see .env.xmpp.example) and dials the component port 5347.
# ============================================================================

services:
  ejabberd:
    image: ejabberd/ecs:24.12
    container_name: beanpon_ejabberd
    restart: always
    # Resource ceilings — ejabberd is light. Tune as connection count grows.
    # Typical idle footprint: ~300-700 MB RAM. Tens of thousands of
    # connections fit on a single node before horizontal scaling is needed.
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 512M
    ports:
      - "5222:5222"   # native XMPP client (TLS)
      - "5443:5443"   # XMPP-over-WebSocket / BOSH (wss, direct)
      # 5280 = plain WS/BOSH behind the host nginx (Cloudflare terminates TLS).
      # Bound to 10.10.0.5 so the host nginx can proxy to it.
      - "10.10.0.5:5280:5280"
      # 5347 (component) is bound to 127.0.0.1 only — NOT published publicly.
      - "127.0.0.1:5347:5347"
    volumes:
      - ./ejabberd.yml:/home/ejabberd/conf/ejabberd.yml:ro
      # TLS certificate (see certfiles in ejabberd.yml). Put a combined
      # cert+key PEM next to this compose file as beanpon.pem, or point this at
      # your existing Let's Encrypt fullchain+key.
      - ./beanpon.pem:/home/ejabberd/conf/beanpon.pem:ro
      # JWT signing secret (= JWT_SECRET). Used by auth_method: jwt to verify
      # client login tokens. Create it once: see README_AUTH.md.
      - ./jwt.key:/home/ejabberd/conf/jwt.key:ro
      - ejabberd_data:/home/ejabberd/database
    networks:
      - beanpon_local-network

volumes:
  ejabberd_data:

networks:
  beanpon_local-network:
    external: true
